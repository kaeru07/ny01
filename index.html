<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>麻雀牌譜解析</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>麻雀牌譜解析</h1>
        <p>天鳳 / ジャンたまの牌譜を読み込んで簡易分析します</p>
      </header>

      <section class="card">
        <h2>牌譜を読み込む</h2>
        <label class="file-label" for="fileInput">牌譜ファイルを選択</label>
        <input id="fileInput" type="file" accept=".txt,.json,.xml,.mjlog" />

        <label class="text-label" for="logText">または牌譜テキストを貼り付け</label>
        <textarea
          id="logText"
          placeholder="天鳳のmjlog(XML)やジャンたまのJSONを貼り付けてください"
          rows="8"
        ></textarea>

        <div class="button-row">
          <button id="analyzeBtn" class="btn primary">解析する</button>
          <button id="sampleBtn" class="btn">サンプルを読み込む</button>
          <button id="clearBtn" class="btn danger">クリア</button>
        </div>
      </section>

      <section class="card" id="statusCard">
        <h2>解析ステータス</h2>
        <p id="statusText">ファイルを選択、またはテキストを貼り付けて「解析する」を押してください。</p>
      </section>

      <section class="card" id="resultCard" hidden>
        <h2>解析結果</h2>
        <div id="summary"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
